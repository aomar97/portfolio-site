site_name: Ahmed Omar — DevOps Portfolio
site_description: Platform engineering portfolio — EKS + Terraform, GitOps, CI/CD, supply-chain security, observability.
site_author: Ahmed Omar

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Projects:
      - EKS Platform (Terraform + GitOps): projects/eks-platform.md
      - Microservices + CI/CD: projects/microservices.md
      - Observability: projects/observability.md
      - Progressive Delivery: projects/progressive-delivery.md
  - How this site ships: how-its-built.md
  - About: about.md
