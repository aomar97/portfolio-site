name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign

jobs:
  docs:
    name: mkdocs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict

  image:
    name: build · scan · sbom · sign · push
    needs: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: img
        run: echo "ref=${REGISTRY}/${{ github.repository_owner }}/portfolio-site:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.img.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy gate (fixable HIGH/CRITICAL)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.71.2
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 "${{ steps.img.outputs.ref }}"

      - name: SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft "${{ steps.img.outputs.ref }}" -o spdx-json > sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: github.ref == 'refs/heads/main'
        run: docker push ${{ steps.img.outputs.ref }}
      - if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3.7.0
      - if: github.ref == 'refs/heads/main'
        run: cosign sign --yes ${{ steps.img.outputs.ref }}

  helm:
    name: helm lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4
      - run: |
          helm lint deploy/helm/site
          helm template site deploy/helm/site -f deploy/helm/site/values-kind.yaml >/dev/null
          helm template site deploy/helm/site -f deploy/helm/site/values-eks.yaml >/dev/null

  # Image promotion is handled by ArgoCD auto-sync against the pushed image
  # (see deploy/argocd/). CI never pushes to a protected main branch; a tag bump,
  # if desired, is done via a PR — keeping branch protection intact.
